<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>BibliToys - Jouets</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
        }

        header {
            background-color: #3498db;
            color: #fff;
            padding: 15px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            text-align: center;
            margin-bottom: 10px;
            margin-top: 10px;
        }

        .top-buttons {
            margin-left: 10px;
        }

        .top-buttons button {
            margin-right: 10px;
            background-color: #2980b9;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .top-buttons button:hover {
            background-color: #3498db;
        }

        nav {
            background-color: #2980b9;
            color: #fff;
            padding: 10px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-right: 20px;
        }

        .nav-link {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

        .nav-link:hover {
            color: #ecf0f1;
        }

        .search-bar {
            text-align: center;
        }

        .section-title {
            background-color: #2980b9;
            color: #fff;
            padding: 5px;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        footer {
            background-color: #3498db;
            color: #fff;
            padding: 10px;
            text-align: center;
        }

        .section-links {
            text-align: center;
            margin-top: 20px;
        }

        .section-links a {
            margin-right: 20px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

        .section-links a:hover {
            color: #ecf0f1;
        }

        section {
            margin-bottom: 20px;
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            color: #3498db;
        }

        footer section {
            background-color: #3498db;
            padding: 10px;
            border-radius: 8px;
            color: #fff; /* Blanc */
        }
        
        .img {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .img img {
            width: 80%;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
            
        }

        .img img:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <header>
